name: Metrics

on:
  schedule:
    - cron: "0 0 * * *"  # 每天 UTC 0点自动更新
  workflow_dispatch:       # 允许手动触发

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Generate GitHub Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: LiangquanLi930
          template: classic
          base: header, repositories
          output_action: commit
          filename: metrics-stats.svg
          config_timezone: Asia/Shanghai
          config_background: "ffc64d"
          config_color: "000000"
          config_icons: "000000"

      - name: Generate Top Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GH_TOKEN }}
          user: LiangquanLi930
          template: classic
          base: ""
          plugin_languages: yes
          plugin_languages_limit: 7
          plugin_languages_ignored: html
          output_action: commit
          filename: metrics-langs.svg
          config_timezone: Asia/Shanghai
          config_background: "4dfcff"
          config_color: "000000"
